<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCorp Business Card NFT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 3D Viewer — sits in the background -->
    <div id="stage"></div>

    <!-- UI overlay — sits on top of the canvas -->
    <div id="ui-overlay">
        <h1>JCorp Digital Business Card</h1>
        <button id="mintButton">Take a Business Card</button>
        <p id="status"></p>
    </div>

    <!-- ethers.js v6 (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>

    <!-- Three.js import map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
        }
    }
    </script>

    <!-- 3D scene -->
    <script type="module" src="scripts/main.js"></script>

    <!-- Wallet + minting logic (plain script — ethers is global via UMD) -->
    <script src="scripts/app.js"></script>

</body>
</html>
